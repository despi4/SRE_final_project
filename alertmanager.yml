global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
- name: default
  email_configs:
  - to: 'alerts@example.com'
    from: 'alertmanager@example.com'
    smarthost: 'smtp.example.com:587'
    auth_username: 'smtp-user'
    auth_password: 'smtp-password'
    require_tls: false
  webhook_configs:
  - url: 'http://localhost:5001/'
