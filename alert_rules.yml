groups:
- name: fastapi-alerts
  rules:
  - alert: FastAPIDown
    expr: up{job="fastapi"} == 0
    for: 1m
    labels:
      severity: critical
      service: fastapi
    annotations:
      summary: "FastAPI service is down"
      description: "Prometheus cannot scrape /metrics from fastapi-app for more than 1 minute."

  - alert: HighErrorRate
    expr: |
      sum(rate(http_requests_total{status_code=~"5.."}[5m]))
      /
      sum(rate(http_requests_total[5m])) > 0.05
    for: 5m
    labels:
      severity: warning
      service: fastapi
    annotations:
      summary: "High error rate on FastAPI service"
      description: "More than 5% of requests are returning 5xx responses for the last 5 minutes."

  - alert: HighLatency
    expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, method, path)) > 0.5
    for: 5m
    labels:
      severity: warning
      service: fastapi
    annotations:
      summary: "Slow requests on FastAPI service"
      description: "The 95th percentile latency is above 500ms for the last 5 minutes."
