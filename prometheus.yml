global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: fastapi-sre

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ['fastapi-app:8000']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
